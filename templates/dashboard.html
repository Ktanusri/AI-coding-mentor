<!DOCTYPE html>
<html>
<head>
    <title>CodeMentor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1>Student Coding Dashboard</h1>
    <p>Total Submissions: <strong>{{ total_submissions }}</strong></p>
    <p>Coding Streak: <strong>{{ streak }} 🔥</strong></p>
    <p>Keep practicing and improve your coding skills 🚀</p>

    <hr>

    <h2>Coding Progress</h2>
    <div style="width: 600px;">
        <canvas id="progressChart"></canvas>
    </div>

    <br>
    <nav>
        <a href="/practice">Go to Practice</a><br><br>
        <a href="/history">View Submission History</a><br><br>
        <a href="/journey">View Coding Journey</a>
    </nav>

    <script>
        // Use the safe filter to ensure Python lists are readable by JS
        var submissionData = {{ submission_ids | safe }};
        var labels = submissionData.map((_, index) => "Submission " + (index + 1));

        var ctx = document.getElementById('progressChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Submission ID Progress',
                    data: submissionData,
                    borderColor: 'rgba(75, 192, 192, 1)',
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderWidth: 2,
                    tension: 0.1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>

</body>
</html>
