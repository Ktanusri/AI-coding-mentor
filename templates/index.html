<!DOCTYPE html>
<html>
<head>
<title>CodeMentor</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.43.0/min/vs/loader.min.js"></script>
</head>

<body>

<div class="sidebar">
<h2>🚀 CodeMentor</h2>
<a href="/">Dashboard</a>
<a href="/problems">Problems</a>
<a href="/leaderboard">Leaderboard</a>
<a href="/login">Login</a>
<a href="/signup">Signup</a>
</div>

<div class="main">

<h1>{{ problem.title }}</h1>
<p><b>Difficulty:</b> {{ problem.difficulty }}</p>
<p>{{ problem.description }}</p>

<form method="POST" action="/submit">

<div id="editor" style="height:300px;"></div>

<input type="hidden" name="code" id="code">
<input type="hidden" name="problem_index" value="0">

<br><br>

<input type="text" name="username" placeholder="Username">

<br><br>

<button type="button" onclick="runCode()">Run</button>
<button type="submit" onclick="saveCode()">Submit</button>

</form>

<div id="output"></div>

</div>

<script>

require.config({
paths:{vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.43.0/min/vs'}
});

require(["vs/editor/editor.main"],function(){

window.editor=monaco.editor.create(document.getElementById("editor"),{
value:"def find_max(arr):\n    pass",
language:"python",
theme:"vs-dark"
});

});

function saveCode(){
document.getElementById("code").value=editor.getValue();
}

function runCode(){

fetch("/run",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"code="+encodeURIComponent(editor.getValue())
})
.then(res=>res.text())
.then(data=>{
document.getElementById("output").innerText=data;
});

}

</script>

</body>
</html>
