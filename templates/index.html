<!DOCTYPE html>
<html>
<head>
<title>CodeMentor</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="sidebar">

<h2>🚀 CodeMentor</h2>

<a href="#" onclick="showPage('dashboard')">Dashboard</a>
<a href="#" onclick="showPage('practice')">Practice</a>
<a href="#" onclick="showPage('history')">History</a>

</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page">

<h1>Dashboard</h1>

<div class="card">
<h3>{{ total_submissions }}</h3>
<p>Total Submissions</p>
</div>

<div class="card">
<h3>Practice</h3>
<p>Start Coding</p>
</div>

</div>


<!-- PRACTICE -->
<div id="practice" class="page" style="display:none;">

<h1>{{ problem.title }}</h1>

<p>{{ problem.description }}</p>

<form method="POST" action="/submit">

<textarea name="code" placeholder="Write your code here"></textarea>

<br><br>

<input type="number" name="duration" placeholder="Time taken">

<br><br>

<button type="submit">Submit Code</button>

</form>

</div>


<!-- HISTORY -->
<div id="history" class="page" style="display:none;">

<h1>Submission History</h1>

<table>

<tr>
<th>ID</th>
<th>Code</th>
</tr>

{% for sub in submissions %}

<tr>
<td>{{ sub[0] }}</td>
<td>{{ sub[1] }}</td>
</tr>

{% endfor %}

</table>

</div>

</div>

<script>

function showPage(page){

let pages=document.getElementsByClassName("page");

for(let i=0;i<pages.length;i++){
pages[i].style.display="none";
}

document.getElementById(page).style.display="block";

}

</script>

</body>
</html>
