<!DOCTYPE html>
<html>
<head>
<title>CodeMentor</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.43.0/min/vs/loader.min.js"></script>

<style>
body{
    margin:0;
    font-family: Arial;
    display:flex;
}

.sidebar{
    width:220px;
    background:black;
    color:white;
    height:100vh;
    padding:20px;
}

.sidebar h2{
    text-align:center;
}

.sidebar a{
    display:block;
    padding:12px;
    margin:10px 0;
    background:#1e1e1e;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.sidebar a:hover{
    background:#ff6b6b;
}

.main{
    flex:1;
    padding:30px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#ff6b6b;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ff4b4b;
}

#output{
    margin-top:20px;
    background:black;
    padding:15px;
    border-radius:8px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🚀 CodeMentor</h2>

<a href="/">Dashboard</a>
<a href="/problems">Problems</a>
<a href="/leaderboard">Leaderboard</a>
<a href="/login">Login</a>
<a href="/signup">Signup</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">

<h1>{{ problem.title }}</h1>

<p><b>Difficulty:</b> {{ problem.difficulty }}</p>

<p>{{ problem.description }}</p>

<p style="color:yellow;">⚠️ Currently supports Python only</p>

<form method="POST" action="/submit" onsubmit="saveCode()">

<div id="editor" style="height:350px;border:1px solid #ccc;"></div>

<input type="hidden" name="code" id="code">
<input type="hidden" name="problem_index" value="0">

<br><br>

<input type="text" name="username" placeholder="Enter Username" required>

<br><br>

<button type="button" onclick="runCode()">Run Code</button>
<button type="submit">Submit Code</button>

</form>

<!-- OUTPUT -->
<div id="output">
    {% if result %}
        <p><b>Result:</b> {{ result }}</p>
    {% endif %}

    {% if feedback %}
        <p><b>AI Feedback:</b></p>
        <p>{{ feedback }}</p>
    {% endif %}
</div>

</div>

<!-- MONACO EDITOR -->
<script>

require.config({
paths:{vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.43.0/min/vs'}
});

require(["vs/editor/editor.main"],function(){

window.editor=monaco.editor.create(document.getElementById("editor"),{

value:"def find_max(arr):\n    # write your code here\n    pass",

language:"python",

theme:"vs-dark",

automaticLayout:true

});

});

function saveCode(){
    document.getElementById("code").value=editor.getValue();
}

function runCode(){

fetch("/run",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"code="+encodeURIComponent(editor.getValue())
})
.then(res=>res.text())
.then(data=>{
document.getElementById("output").innerText=data;
});

}

</script>

</body>
</html>
