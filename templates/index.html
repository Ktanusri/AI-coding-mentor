<!DOCTYPE html>
<html>
<head>
<title>CodeMentor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.43.0/min/vs/loader.min.js"></script>

<style>
body{
    margin:0;
    font-family:'Segoe UI';
    background:#0f172a;
    color:white;
}
.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#020617;
}
.main{
    padding:40px;
}
#editor{
    height:350px;
}
button{
    padding:10px;
    background:#6366f1;
    color:white;
    border:none;
    border-radius:6px;
}
select{
    padding:8px;
    margin-right:10px;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>🚀 CodeMentor</h2>

    <div>
        {% if username %}
            👤 {{ username }} <a href="/logout" style="color:white;">Logout</a>
        {% else %}
            <a href="/login" style="color:white;">Login</a>
            <a href="/signup" style="color:white;">Signup</a>
        {% endif %}
    </div>
</div>

<div class="main">

<!-- 🔥 FILTERS -->
<select onchange="changeDifficulty(this.value)">
    <option value="All" {% if difficulty=="All" %}selected{% endif %}>All</option>
    <option value="Easy" {% if difficulty=="Easy" %}selected{% endif %}>Easy</option>
    <option value="Medium" {% if difficulty=="Medium" %}selected{% endif %}>Medium</option>
</select>

<select onchange="changeCategory(this.value)">
    <option value="All" {% if category=="All" %}selected{% endif %}>All</option>
    <option value="Array" {% if category=="Array" %}selected{% endif %}>Array</option>
    <option value="String" {% if category=="String" %}selected{% endif %}>String</option>
    <option value="Math" {% if category=="Math" %}selected{% endif %}>Math</option>
</select>

<h2>{{ problem.title }}</h2>
<p>{{ problem.description }}</p>

<form method="POST" action="/submit" onsubmit="saveCode()">

<div id="editor"></div>

<input type="hidden" name="code" id="code">
<input type="hidden" name="problem_index" value="{{ current_index }}">
<input type="hidden" name="difficulty" value="{{ difficulty }}">
<input type="hidden" name="category" value="{{ category }}">

<br><br>

<button type="button" onclick="runCode()">Run</button>
<button type="button" onclick="getHint()">💡 Get Hint</button>
<button type="submit">Submit</button>

</form>

<div id="output">
{% if result %}
<p>{{ result }}</p>
{% endif %}
</div>

</div>

<script>

require.config({paths:{vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.43.0/min/vs'}});

require(["vs/editor/editor.main"],function(){
window.editor=monaco.editor.create(document.getElementById("editor"),{
value:"def function():\n    pass",
language:"python",
theme:"vs-dark"
});
});

function saveCode(){
document.getElementById("code").value=editor.getValue();
}

function runCode(){
fetch("/run",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"code="+encodeURIComponent(editor.getValue())
    +"&problem_index="+document.querySelector('[name=problem_index]').value
    +"&difficulty="+document.querySelector('[name=difficulty]').value
    +"&category="+document.querySelector('[name=category]').value
})
.then(res=>res.text())
.then(data=>document.getElementById("output").innerText=data);
}

function changeDifficulty(level){
window.location.href="/?difficulty="+level;
}

function changeCategory(cat){
window.location.href="/?category="+cat;
}

</script>
<script>

function saveCode(){
    document.getElementById("code").value=editor.getValue();
}

function runCode(){
    // existing code
}

/* 🔥 ADD BELOW */
function getHint(){
fetch("/hint",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"code="+encodeURIComponent(editor.getValue())+
"&problem_index="+document.querySelector('[name=problem_index]').value
})
.then(res=>res.text())
.then(data=>{
document.getElementById("output").innerText=data;
});
}

</script>
</body>
</html>
