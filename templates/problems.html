<!DOCTYPE html>
<html>

<head>
<title>Problems</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>📚 Problem List</h1>

<table>

<tr>
<th>Title</th>
<th>Difficulty</th>
<th>Action</th>
</tr>

{% for p in problems %}

<tr>
<td>{{ p.title }}</td>
<td>{{ p.difficulty }}</td>
<td>
<a href="/?problem={{ loop.index0 }}">Solve</a>
</td>
</tr>

{% endfor %}

</table>

</body>
</html>
